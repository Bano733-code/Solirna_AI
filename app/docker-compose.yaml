version: "3.9"

services:

  postgres:
    image: pgvector/pgvector:pg16

    container_name: solirna_postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .

    container_name: solirna_backend

    restart: always

    ports:
      - "8000:8000"

    depends_on:
      - postgres

    env_file:
      - .env

    volumes:
      - .:/app

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
